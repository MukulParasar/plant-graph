<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant Knowledge Graph — Unified Asset &amp; Operations Brain</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/vis-network.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #0b0f10;
    --panel: #10161a;
    --panel-2: #151d22;
    --line: #223038;
    --blueprint: #1c3a4a;
    --amber: #ffb020;
    --amber-dim: #7a5514;
    --text: #dbe6e8;
    --text-dim: #7f9199;
    --ok: #3ecf8e;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      linear-gradient(var(--blueprint) 1px, transparent 1px) 0 0/32px 32px,
      linear-gradient(90deg, var(--blueprint) 1px, transparent 1px) 0 0/32px 32px,
      var(--ink);
    background-blend-mode: overlay, overlay, normal;
    opacity: 1;
    color: var(--text);
    font-family: var(--font-sans);
    min-height:100vh;
  }
  header{
    padding: 22px 32px 16px;
    border-bottom: 1px solid var(--line);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  .brand{display:flex; align-items:baseline; gap:14px;}
  .brand .tag{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--amber);
    border:1px solid var(--amber-dim);
    padding:2px 8px;
    border-radius:2px;
    letter-spacing:0.08em;
  }
  h1{
    font-family: var(--font-mono);
    font-weight:600;
    font-size:20px;
    margin:0;
    letter-spacing: 0.01em;
  }
  h1 span{color:var(--amber);}
  .subtitle{font-size:12px; color:var(--text-dim); font-family:var(--font-mono);}

  .stats-row{display:flex; gap:10px; flex-wrap:wrap;}
  .stat{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-dim);
    border:1px solid var(--line);
    background:var(--panel);
    padding:6px 10px;
    border-radius:2px;
  }
  .stat b{color:var(--text); font-size:14px; display:block; font-weight:600;}

  main{
    display:grid;
    grid-template-columns: 300px 1fr 320px;
    gap:1px;
    background: var(--line);
    min-height: calc(100vh - 90px);
  }
  .col{background:var(--ink); padding:18px; overflow-y:auto; max-height: calc(100vh - 90px);}

  .section-title{
    font-family:var(--font-mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--amber);
    margin: 0 0 10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-title::after{content:''; flex:1; height:1px; background:var(--line);}

  button, .btn{
    font-family:var(--font-mono);
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:9px 12px;
    border-radius:2px;
    cursor:pointer;
    font-size:12px;
    width:100%;
    text-align:left;
    transition: border-color 0.15s, color 0.15s;
  }
  button:hover{border-color:var(--amber-dim); color:var(--amber);}
  .btn-primary{border-color:var(--amber-dim); color:var(--amber);}
  .btn-primary:hover{background:var(--amber); color:var(--ink);}

  input[type=text]{
    font-family:var(--font-mono);
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:9px 10px;
    border-radius:2px;
    font-size:12px;
  }
  input[type=file]{font-family:var(--font-mono); font-size:11px; color:var(--text-dim); width:100%;}

  .doc-item, .result-item{
    border:1px solid var(--line);
    background:var(--panel);
    padding:10px;
    border-radius:2px;
    margin-bottom:8px;
    font-size:12px;
  }
  .doc-item .id, .result-item .id{font-family:var(--font-mono); color:var(--amber); font-size:11px;}
  .doc-item .meta, .result-item .meta{color:var(--text-dim); font-size:11px; margin-top:4px;}

  #graph{width:100%; height:100%; border-radius:2px;}
  .graph-wrap{position:relative; height:100%;}
  .legend{
    position:absolute; bottom:14px; left:14px;
    background:rgba(16,22,26,0.9); border:1px solid var(--line);
    padding:10px 12px; border-radius:2px; font-family:var(--font-mono); font-size:10px;
    display:flex; gap:12px; flex-wrap:wrap;
  }
  .legend .dot{width:8px; height:8px; display:inline-block; border-radius:50%; margin-right:5px;}

  .entity-detail{font-size:12px;}
  .entity-detail h3{font-family:var(--font-mono); color:var(--amber); font-size:14px; margin:0 0 4px;}
  .entity-detail .type-badge{
    display:inline-block; font-family:var(--font-mono); font-size:10px;
    color:var(--text-dim); border:1px solid var(--line); padding:1px 6px; border-radius:2px; margin-bottom:10px;
  }
  .neighbor{
    display:flex; justify-content:space-between; align-items:center;
    padding:6px 0; border-bottom:1px solid var(--line); font-size:11.5px; cursor:pointer;
  }
  .neighbor:hover{color:var(--amber);}
  .neighbor .weight{font-family:var(--font-mono); color:var(--text-dim); font-size:10px;}

  .empty-hint{color:var(--text-dim); font-size:12px; line-height:1.5;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Plant<span>Graph</span></h1>
    <span class="tag">INGESTION + KNOWLEDGE GRAPH</span>
  </div>
  <div class="stats-row" id="statsRow"></div>
</header>

<main>
  <div class="col" id="leftCol">
    <div class="section-title">Ingest</div>
    <button class="btn-primary" id="loadSamplesBtn" style="margin-bottom:8px;">▸ Load sample plant documents</button>
    <input type="file" id="fileInput" style="margin: 10px 0 8px;" />
    <button id="uploadBtn">▸ Upload &amp; extract</button>
    <div id="uploadStatus" class="empty-hint" style="margin-top:8px;"></div>

    <div class="section-title" style="margin-top:22px;">Search corpus</div>
    <input type="text" id="searchInput" placeholder="e.g. bearing failure P-101A" />
    <div id="searchResults" style="margin-top:10px;"></div>

    <div class="section-title" style="margin-top:22px;">Documents</div>
    <div id="docList" class="empty-hint">No documents ingested yet.</div>
  </div>

  <div class="col graph-wrap" style="padding:10px;">
    <div id="graph"></div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="col" id="rightCol">
    <div class="section-title">Entity detail</div>
    <div id="entityDetail" class="empty-hint">Click a node in the graph to inspect its connections and source documents.</div>
  </div>
</main>

<script>
const API = "";
const TYPE_COLORS = {
  document:   "#5aa9c9",
  EQUIPMENT:  "#ffb020",
  DOCUMENT:   "#5aa9c9",
  REGULATORY: "#e2574c",
  PERSON:     "#3ecf8e",
  DATE:       "#8a7fd6",
  MEASUREMENT:"#7f9199",
};

let network = null;

async function refreshAll(){
  await Promise.all([refreshStats(), refreshGraph(), refreshDocs()]);
}

async function refreshStats(){
  const r = await fetch(API + "/api/stats");
  const s = await r.json();
  const row = document.getElementById("statsRow");
  const items = [
    ["Documents", s.documents],
    ["Nodes", s.total_nodes],
    ["Edges", s.total_edges],
  ];
  for (const [label, count] of Object.entries(s.entity_type_counts || {})){
    items.push([label, count]);
  }
  row.innerHTML = items.map(([label, val]) =>
    `<div class="stat"><b>${val}</b>${label}</div>`
  ).join("");
}

async function refreshDocs(){
  const r = await fetch(API + "/api/documents");
  const docs = await r.json();
  const el = document.getElementById("docList");
  if (!docs.length){ el.innerHTML = "No documents ingested yet."; return; }
  el.innerHTML = docs.map(d => `
    <div class="doc-item">
      <div class="id">${d.doc_id}</div>
      <div>${d.filename}</div>
      <div class="meta">${d.metadata.document_type || "—"} · ${d.entity_count} entities</div>
    </div>
  `).join("");
}

async function refreshGraph(){
  const r = await fetch(API + "/api/graph");
  const data = await r.json();
  const nodes = data.nodes.map(n => ({
    id: n.id,
    label: n.label,
    shape: n.node_type === "document" ? "box" : "dot",
    size: n.node_type === "document" ? 16 : Math.min(10 + (n.mentions||1)*2, 30),
    color: {
      background: TYPE_COLORS[n.entity_type] || TYPE_COLORS[n.node_type] || "#666",
      border: "#0b0f10",
      highlight: { background: "#ffb020", border: "#0b0f10" }
    },
    font: { color: "#dbe6e8", face: "IBM Plex Mono", size: 11 },
  }));
  const edges = data.edges.map(e => ({
    from: e.source, to: e.target,
    width: Math.min(1 + Math.log(e.weight+1), 5),
    color: { color: e.edge_type === "contains" ? "#223038" : "#3a4750", opacity: 0.6 },
  }));

  const container = document.getElementById("graph");
  const graphData = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
  const options = {
    physics: { stabilization: true, barnesHut: { gravitationalConstant: -4000, springLength: 90 } },
    interaction: { hover: true },
  };
  if (network) network.destroy();
  network = new vis.Network(container, graphData, options);
  network.on("click", async (params) => {
    if (params.nodes.length){
      showEntityDetail(params.nodes[0]);
    }
  });

  renderLegend();
}

function renderLegend(){
  const legend = document.getElementById("legend");
  legend.innerHTML = Object.entries(TYPE_COLORS)
    .filter(([k]) => k !== "document")
    .map(([label, color]) => `<span><span class="dot" style="background:${color}"></span>${label}</span>`)
    .join("");
}

async function showEntityDetail(id){
  const el = document.getElementById("entityDetail");
  el.innerHTML = "Loading…";
  const r = await fetch(API + "/api/entity/" + encodeURIComponent(id));
  if (!r.ok){ el.innerHTML = "This is a document node — see Documents panel for its contents."; return; }
  const d = await r.json();
  el.innerHTML = `
    <h3>${d.label}</h3>
    <div class="type-badge">${d.entity_type || d.node_type}</div>
    <div class="empty-hint">Mentioned ${d.mentions || 1}× across ${(d.documents||[]).length} document(s)</div>
    <div class="section-title" style="margin-top:16px;">Connections (${d.neighbors.length})</div>
    ${d.neighbors.slice(0,25).map(n => `
      <div class="neighbor" onclick="showEntityDetail('${n.id.replace(/'/g,"\\'")}')">
        <span>${n.label}</span>
        <span class="weight">×${n.edge.weight}</span>
      </div>
    `).join("")}
  `;
}

async function search(query){
  const el = document.getElementById("searchResults");
  if (!query){ el.innerHTML = ""; return; }
  el.innerHTML = "Searching…";
  const r = await fetch(API + "/api/search?q=" + encodeURIComponent(query));
  const data = await r.json();
  if (!data.results.length){ el.innerHTML = '<div class="empty-hint">No matches.</div>'; return; }
  el.innerHTML = data.results.map(res => `
    <div class="result-item">
      <div class="id">${res.filename} · score ${res.score.toFixed(2)}</div>
      <div class="meta">${res.snippet.replace(/\n/g," ").slice(0,180)}…</div>
    </div>
  `).join("");
}

document.getElementById("loadSamplesBtn").addEventListener("click", async () => {
  document.getElementById("uploadStatus").innerText = "Ingesting sample documents…";
  await fetch(API + "/api/ingest_samples", { method: "POST" });
  document.getElementById("uploadStatus").innerText = "Sample documents ingested.";
  refreshAll();
});

document.getElementById("uploadBtn").addEventListener("click", async () => {
  const input = document.getElementById("fileInput");
  if (!input.files.length){ document.getElementById("uploadStatus").innerText = "Choose a file first."; return; }
  const fd = new FormData();
  fd.append("file", input.files[0]);
  document.getElementById("uploadStatus").innerText = "Extracting…";
  const r = await fetch(API + "/api/ingest", { method: "POST", body: fd });
  const data = await r.json();
  document.getElementById("uploadStatus").innerText = r.ok
    ? `Extracted ${data.entities_extracted} entities (${data.unique_entities} unique).`
    : `Error: ${data.detail}`;
  refreshAll();
});

let searchTimer;
document.getElementById("searchInput").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => search(e.target.value), 350);
});

refreshAll();
</script>
</body>
</html>
